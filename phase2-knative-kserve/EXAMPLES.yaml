---
# Example 1: HuggingFace Hub - Qwen3-8B-INT4 (Recommended)
# Directly downloads from HuggingFace Hub, no storage setup required
# CPU optimized for throughput
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen3-8b-int4-ov
  namespace: kserve
  annotations:
    autoscaling.knative.dev/min-scale: "0"
    autoscaling.knative.dev/max-scale: "5"
    autoscaling.knative.dev/target: "10"
    sidecar.istio.io/inject: "true"
spec:
  predictor:
    minReplicas: 0
    maxReplicas: 5
    model:
      runtime: kserve-openvino
      modelFormat:
        name: huggingface
      args:
        - --source_model=OpenVINO/Qwen3-8B-int4-ov
        - --model_repository_path=/tmp
        - --task=text_generation
        - --target_device=CPU
        - --plugin_config={"PERFORMANCE_HINT":"THROUGHPUT","NUM_STREAMS":"AUTO"}
        - --nireq=4
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"

