spec:
  predictor:
    model:
      runtime: kserve-openvino
      modelFormat:
        name: openvino
      storageUri: "s3://my-bucket/models/my-model"
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"

