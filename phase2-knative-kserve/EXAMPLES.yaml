---
# Example 7: High-Traffic Model (No Scale-to-Zero)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: high-traffic-model
  namespace: kserve
  annotations:
    autoscaling.knative.dev/min-scale: "2"      # Always keep 2 pods running
    autoscaling.knative.dev/max-scale: "20"     # Scale up to 20 pods
    autoscaling.knative.dev/target: "50"        # 50 concurrent requests per pod
    sidecar.istio.io/inject: "true"
spec:
  predictor:
    minReplicas: 2
    maxReplicas: 20
    model:
      runtime: kserve-openvino
      modelFormat:
        name: huggingface
      args:
        - --source_model=OpenVINO/Qwen3-8B-int4-ov
        - --model_repository_path=/tmp
        - --task=text_generation
        - --target_device=CPU
        - --plugin_config={"PERFORMANCE_HINT":"THROUGHPUT","NUM_STREAMS":"4"}
        - --nireq=8
      resources:
        requests:
          cpu: "4"
          memory: "8Gi"
        limits:
          cpu: "8"
          memory: "16Gi"

---
# Example 8: Low-Latency Model (Always Warm)
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: low-latency-model
  namespace: kserve
  annotations:
    autoscaling.knative.dev/min-scale: "1"      # Keep 1 pod always warm
    autoscaling.knative.dev/max-scale: "5"      # Limited scaling
    autoscaling.knative.dev/target: "10"        # Low concurrency target
    autoscaling.knative.dev/scale-down-delay: "10m"  # Slow scale-down
    sidecar.istio.io/inject: "true"
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 5
    model:
      runtime: kserve-openvino
      modelFormat:
        name: huggingface
      args:
        - --source_model=OpenVINO/Phi-3.5-mini-instruct-int4-ov
        - --model_repository_path=/tmp
        - --task=text_generation
        - --target_device=CPU
        - --plugin_config={"PERFORMANCE_HINT":"LATENCY"}
        - --nireq=2
      resources:
        requests:
          cpu: "2"
          memory: "4Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
