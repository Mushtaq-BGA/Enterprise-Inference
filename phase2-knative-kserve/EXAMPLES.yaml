---
# Example 4: PVC Storage - Pre-downloaded OpenVINO Model
# Requires PVC with model files already present
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: custom-model-pvc
  namespace: kserve
  annotations:
    autoscaling.knative.dev/min-scale: "0"
    autoscaling.knative.dev/max-scale: "3"
    sidecar.istio.io/inject: "true"
spec:
  predictor:
    model:
      runtime: kserve-openvino
      modelFormat:
        name: openvino
      storageUri: "pvc://model-storage-pvc/my-custom-model"
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "2"
          memory: "4Gi"

---
