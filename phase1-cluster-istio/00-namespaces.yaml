---
# Core namespaces for AI Stack
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    name: istio-system
    istio-injection: disabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: kserve
  labels:
    name: kserve
    istio-injection: enabled
    serving.knative.dev/release: devel
---
apiVersion: v1
kind: Namespace
metadata:
  name: litellm
  labels:
    name: litellm
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: redis
  labels:
    name: redis
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: postgres
  labels:
    name: postgres
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: model-watcher
  labels:
    name: model-watcher
    istio-injection: enabled
