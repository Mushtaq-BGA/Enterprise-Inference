apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-controlplane
  namespace: istio-system
spec:
  profile: minimal
  meshConfig:
    accessLogFile: /dev/stdout
    enablePrometheusMerge: true
    defaultConfig:
      holdApplicationUntilProxyStarts: true
      tracing:
        zipkin:
          address: zipkin.istio-system:9411
    defaultProviders:
      accessLog:
        - envoy
      metrics:
        - prometheus
  components:
    pilot:
      k8s:
        overlays:
          - apiVersion: apps/v1
            kind: Deployment
            name: istiod
            patches:
              - path: spec.template.spec.containers[0].resources
                value:
                  requests:
                    cpu: 200m
                    memory: 512Mi
                  limits:
                    cpu: 1000m
                    memory: 1Gi
    ingressGateways:
      - name: istio-ingressgateway
        enabled: true
        k8s:
          service:
            type: NodePort
            externalTrafficPolicy: Cluster
            ports:
              - name: status-port
                port: 15021
                targetPort: 15021
                nodePort: 32021
              - name: http2
                port: 80
                targetPort: 8080
                nodePort: 32080
              - name: https
                port: 443
                targetPort: 8443
                nodePort: 32443
              - name: tls
                port: 15443
                targetPort: 15443
              - name: tcp-status
                port: 15020
                targetPort: 15020
          overlays:
            - apiVersion: apps/v1
              kind: Deployment
              name: istio-ingressgateway
              patches:
                - path: spec.template.spec.containers[0].resources
                  value:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 1000m
                      memory: 512Mi
  values:
    global:
      meshID: ai-stack
      proxy:
        logLevel: warning
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
