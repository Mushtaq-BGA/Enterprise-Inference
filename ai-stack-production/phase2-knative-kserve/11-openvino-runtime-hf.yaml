---
# OpenVINO ClusterServingRuntime with HuggingFace Pull Support
# Allows models to be pulled directly from HuggingFace Hub
apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: kserve-openvino-hf
spec:
  annotations:
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: "8080"
  containers:
  - name: kserve-container
    image: openvino/model_server:2025.3
    args:
    - --port=9000
    - --rest_port=8080
    - --model_name={{.Name}}
    - --model_path=/mnt/models
    - --file_system_poll_wait_seconds=0
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 5000
  protocolVersions:
  - v2
  - grpc-v2
  supportedModelFormats:
  - name: openvino
    autoSelect: true
  - name: huggingface
    autoSelect: true
